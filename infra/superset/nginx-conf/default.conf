server {
    listen 8088;
    server_name viz.chopsworkshop.com localhost;

    location = / {
        return 302 /superset/;
    }

    location = /reports {
        return 301 /reports/;
    }

    location /reports/briefs/ {
        alias /usr/share/nginx/html/briefs/;
        index index.html;
        autoindex off;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location /visualizations/ {
        alias /usr/share/nginx/html/visualizations/;
        index index.html;
        autoindex off;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location /reports/visualizations/ {
        alias /usr/share/nginx/html/visualizations/;
        index index.html;
        autoindex off;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location /reports/ {
        alias /usr/share/nginx/html/reports/;
        index index.html;
        autoindex off;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location = /superset {
        return 301 /superset/;
    }

    location /superset/ {
        proxy_pass http://superset-app:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
